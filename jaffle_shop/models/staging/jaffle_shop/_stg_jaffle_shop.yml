models:

  - name: stg_jaffle_shop__customers
    description: Staged customer data from jaffle shop app
    columns:
      - name: customer_id
        description: the primary key for customers
        data_tests:
          - unique
          - not_null

  - name: stg_jaffle_shop__orders
    description: Staged order data from jaffle shop app
    columns:
      - name: order_id
        description: the primary key for orders
        data_tests:
          - unique
          - not_null

      - name: status
        description: "{{ doc('order_status') }}"
        data_tests:
          - accepted_values:
              arguments:
                values: ['placed', 'shipped', 'completed', 'returned', 'return_pending']

      - name: customer_id
        description: Foreign key to stg_jaffle_shop__customers.customer_id
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_jaffle_shop__customers')
                field: customer_id